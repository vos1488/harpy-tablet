name: Build NavRelay Tweak

on:
  push:
    paths:
      - 'ios_tweak/NavRelay/**'
  pull_request:
    paths:
      - 'ios_tweak/NavRelay/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          # Install Theos dependencies
          brew install ldid make

          # Clone Theos
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

          # Download iOS SDK (14.5)
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz -C $THEOS/sdks --strip-components=1

      - name: Build tweak (rootful — arm64 + arm64e)
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          cd ios_tweak/NavRelay

          # Build rootful .deb
          gmake clean
          gmake package FINALPACKAGE=1

      - name: Build tweak (rootless — arm64e only)
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          cd ios_tweak/NavRelay

          # Build rootless .deb
          gmake clean
          gmake package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ios_tweak/NavRelay/packages/*.deb artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: NavRelay-debs
          path: artifacts/*.deb
          if-no-files-found: error

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
          generate_release_notes: true
